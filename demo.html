<html lang="zh-CN">
<head>

        .search-box input { width: 100%; padding: 12px 40px 12px 15px; border: 2px solid #e0e0e0; border-radius: 25px; font-size: 14px; }
        .search-box input:focus { outline: none; border-color: #667eea; }
        .search-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: #999; }
        
        .tabs { display: flex; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .tab { padding: 8px 16px; background: rgba(255,255,255,0.2); border: 2px solid rgba(255,255,255,0.3); border-radius: 20px; color: white; cursor: pointer; font-size: 13px; }
        .tab.active { background: white; color: #667eea; }
        
        .section { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .section h2 { color: #667eea; font-size: 18px; margin-bottom: 15px; padding-bottom: 10px; border-bottom: 2px solid #667eea; }
        
        .func-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 10px; }
        .func-card { background: #f8f9ff; border: 2px solid #e0e0ff; border-radius: 8px; padding: 12px; cursor: pointer; transition: all 0.2s; }
        .func-card:hover { background: #eef1ff; border-color: #667eea; transform: translateY(-2px); }
        .func-card h3 { color: #667eea; font-size: 16px; margin-bottom: 5px; }
        .func-card p { color: #666; font-size: 12px; margin-bottom: 8px; }
        .func-card .syntax { background: #2d2d2d; color: #f8f8f2; padding: 4px 8px; border-radius: 4px; font-family: monospace; font-size: 11px; margin-bottom: 8px; display: block; }
        .func-card .tag { display: inline-block; background: #667eea; color: white; padding: 2px 8px; border-radius: 10px; font-size: 10px; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; }
        .modal.show { display: block; }
        .modal-content { background: #f0f0f0; margin: 30px auto; padding: 0; border-radius: 8px; max-width: 900px; max-height: calc(100vh - 60px); overflow-y: auto; }

        .excel-header { background: #217346; color: white; padding: 15px; }
        .excel-header h3 { font-size: 16px; }
        .excel-window { background: white; }
        .toolbar { background: #f3f2f1; border-bottom: 1px solid #e1dfdd; padding: 6px 10px; display: flex; gap: 8px; }
        .toolbar .btn { padding: 4px 10px; background: white; border: 1px solid #d1d1d1; border-radius: 2px; font-size: 12px; }
        .formula-bar { display: flex; align-items: center; padding: 6px 10px; border-bottom: 1px solid #e1dfdd; }
        .formula-bar .label { color: #666; font-size: 12px; margin-right: 8px; }
        .formula-bar .input { flex: 1; padding: 4px 8px; border: 1px solid #d1d1d1; font-family: monospace; font-size: 13px; }
        
        .spreadsheet { overflow: auto; max-height: 280px; }
        table { border-collapse: collapse; width: 100%; }
        th, td { border: 1px solid #e1dfdd; padding: 6px 10px; text-align: center; min-width: 60px; font-size: 13px; }
        th { background: #f3f2f1; font-weight: 600; }
        .row-header { background: #f3f2f1; width: 35px; }
        .cell.selected { outline: 2px solid #217346; outline-offset: -2px; }
        .cell.highlight { background: #fff3cd; }
        .cell.result { background: #d4edda; font-weight: bold; }
        .cell.editing { outline: 2px solid #0078d4; outline-offset: -2px; }
        
        .controls-area { padding: 15px; }
        .step-info { background: #0078d4; color: white; padding: 10px; border-radius: 6px; margin-bottom: 12px; }
        .step-info h4 { font-size: 14px; margin-bottom: 3px; }
        .step-info p { font-size: 12px; opacity: 0.9; }

        .progress-bar { background: linear-gradient(90deg, #0078d4, #217346); height: 100%; transition: width 0.3s; }
        
        .speed-control { display: flex; gap: 5px; margin: 10px 0; align-items: center; flex-wrap: wrap; }
        .speed-control label { font-size: 12px; font-weight: 600; }
        .speed-btn { padding: 4px 10px; border: 2px solid #0078d4; background: white; color: #0078d4; border-radius: 15px; cursor: pointer; font-size: 11px; }
        .speed-btn.active { background: #0078d4; color: white; }
        
        .btn { padding: 6px 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; margin: 0 3px; }
        .btn-primary { background: #0078d4; color: white; }
        .btn-secondary { background: #e1dfdd; color: #333; }
        
        .step-list { margin-top: 15px; }
        .step-item { background: #f8f9ff; border-left: 3px solid #667eea; padding: 8px 12px; margin: 5px 0; border-radius: 4px; font-size: 12px; }
        .step-item.active { background: #fff3cd; border-left-color: #ffc107; }
    </style>
</head>

            </div>
        </div>

                    <button class="speed-btn" data-speed="2" onclick="setSpeed(2)">2x</button>

                    <button class="btn btn-secondary" onclick="resetDemo()">🔄</button>

                {n:'DROP',d:'舍行列',s:'=DROP(区，行)',t:'数组',tb:[['数据'],['A'],['B'],['C'],['D'],['E'],['去前 2','']],st:[{t:'选中 B2',d:'点击 B2',f:'',h:[],sel:''},{t:'输入=DROP(',d:'输入函数',f:'=DROP(',h:['B2'],sel:'B2'},{t:'选择 A2:A6,2)',d:'参数',f:'=DROP(A2:A6,2)',h:['A2','A3','A4','A5','A6'],sel:'A2:A6'},{t:'按 Enter',d:'完成',f:'=DROP(A2:A6,2)',r:'B2:C B3:D B4:E',h:['B2','B3','B4'],sel:'B2'}]},
                {n:'VSTACK',d:'垂直堆叠',s:'=VSTACK(区 1，区 2)',t:'数组',tb:[['表 1'],['A'],['B'],[''],['表 2'],['C'],['D'],['合并:','']],st:[{t:'选中 D2',d:'点击 D2',f:'',h:[],sel:''},{t:'输入=VSTACK(',d:'输入函数',f:'=VSTACK(',h:['D2'],sel:'D2'},{t:'选择 A2:A3,A5:A6)',d:'参数',f:'=VSTACK(A2:A3,A5:A6)',h:['A2','A3','A5','A6'],sel:'A2:A3,A5:A6'},{t:'按 Enter',d:'完成',f:'=VSTACK(A2:A3,A5:A6)',r:'D2:A D3:B D4:C D5:D',h:['D2','D3','D4','D5'],sel:'D2'}]},
                {n:'HSTACK',d:'水平堆叠',s:'=HSTACK(区 1，区 2)',t:'数组',tb:[['A','B'],['1','2'],['3','4'],['合并:','']],st:[{t:'选中 D2',d:'点击 D2',f:'',h:[],sel:''},{t:'输入=HSTACK(',d:'输入函数',f:'=HSTACK(',h:['D2'],sel:'D2'},{t:'选择 A2:A3,B2:B3)',d:'参数',f:'=HSTACK(A2:A3,B2:B3)',h:['A2','A3','B2','B3'],sel:'A2:A3,B2:B3'},{t:'按 Enter',d:'完成',f:'=HSTACK(A2:A3,B2:B3)',r:'D2:A B 1 2',h:['D2'],sel:'D2'}]},
                {n:'TOROW',d:'转行',s:'=TOROW(区)',t:'数组',tb:[['A','B','C'],['1','2','3'],['4','5','6'],['转行:','']],st:[{t:'选中 A5',d:'点击 A5',f:'',h:[],sel:''},{t:'输入=TOROW(',d:'输入函数',f:'=TOROW(',h:['A5'],sel:'A5'},{t:'选择 A2:C3)',d:'参数',f:'=TOROW(A2:C3)',h:['A2','B2','C2','A3','B3','C3'],sel:'A2:C3'},{t:'按 Enter',d:'完成',f:'=TOROW(A2:C3)',r:'A5:1 2 3 4 5 6',h:['A5'],sel:'A5'}]},
                {n:'TOCOL',d:'转列',s:'=TOCOL(区)',t:'数组',tb:[['A','B','C'],['1','2','3'],['4','5','6'],['转列:','']],st:[{t:'选中 E2',d:'点击 E2',f:'',h:[],sel:''},{t:'输入=TOCOL(',d:'输入函数',f:'=TOCOL(',h:['E2'],sel:'E2'},{t:'选择 A2:C3)',d:'参数',f:'=TOCOL(A2:C3)',h:['A2','B2','C2','A3','B3','C3'],sel:'A2:C3'},{t:'按 Enter',d:'完成',f:'=TOCOL(A2:C3)',r:'E2:1 2 3 4 5 6(竖排)',h:['E2','E3','E4','E5','E6','E7'],sel:'E2'}]},
                {n:'TEXTSPLIT',d:'文本拆分',s:'=TEXTSPLIT(文，分)',t:'数组',tb:[['文本','拆分后'],['A,B,C',''],['X,Y,Z','']],st:[{t:'选中 B2',d:'点击 B2',f:'',h:[],sel:''},{t:'输入=TEXTSPLIT(',d:'输入函数',f:'=TEXTSPLIT(',h:['B2'],sel:'B2'},{t:'输入 A2,",")',d:'参数',f:'=TEXTSPLIT(A2,",")',h:['B2','A2'],sel:'B2'},{t:'按 Enter',d:'完成',f:'=TEXTSPLIT(A2,",")',r:'B2:A C2:B D2:C',h:['B2','C2','D2'],sel:'B2'}]},
                {n:'WRAPROWS',d:'换行',s:'=WRAPROWS(区，数)',t:'数组',tb:[['数据'],['1'],['2'],['3'],['4'],['5'],['6'],['换行:','']],st:[{t:'选中 B2',d:'点击 B2',f:'',h:[],sel:''},{t:'输入=WRAPROWS(',d:'输入函数',f:'=WRAPROWS(',h:['B2'],sel:'B2'},{t:'选择 A2:A7,3)',d:'参数',f:'=WRAPROWS(A2:A7,3)',h:['A2','A3','A4','A5','A6','A7'],sel:'A2:A7'},{t:'按 Enter',d:'完成',f:'=WRAPROWS(A2:A7,3)',r:'B2:1 2 3 B3:4 5 6',h:['B2','B3'],sel:'B2'}]},
                {n:'LET',d:'定义变量',s:'=LET(名，值，算)',t:'高级',tb:[['A','B','结果'],['10','20','']],st:[{t:'选中 C2',d:'点击 C2',f:'',h:[],sel:''},{t:'输入=LET(',d:'输入函数',f:'=LET(',h:['C2'],sel:'C2'},{t:'输入 x,A2+B2,',d:'定义变量',f:'=LET(x,A2+B2,',h:['C2','A2','B2'],sel:'C2'},{t:'输入 x*2)',d:'计算',f:'=LET(x,A2+B2,x*2)',h:['C2'],sel:'C2'},{t:'按 Enter',d:'完成',f:'=LET(x,A2+B2,x*2)',r:'C2:60',h:['C2'],sel:'C2'}]},
                {n:'LAMBDA',d:'自定义函数',s:'=LAMBDA(参，算)(值)',t:'高级',tb:[['输入','输出'],['5','']],st:[{t:'选中 B2',d:'点击 B2',f:'',h:[],sel:''},{t:'输入=LAMBDA(',d:'输入函数',f:'=LAMBDA(',h:['B2'],sel:'B2'},{t:'输入 x,x^2)(5)',d:'参数和计算',f:'=LAMBDA(x,x^2)(5)',h:['B2'],sel:'B2'},{t:'按 Enter',d:'完成',f:'=LAMBDA(x,x^2)(5)',r:'B2:25',h:['B2'],sel:'B2'}]}
            ]
        };
        
        let currentFunc = null;
        let currentStep = 0;
        let isPlaying = false;
        let playSpeed = 1;
        let playTimer = null;
        let currentCategory = 'all';
        
        function render() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            let html = '';
            
            ['p0','p1','p2'].forEach(cat => {
                if (currentCategory !== 'all' && currentCategory !== cat) return;
                
                const funcs = allFuncs[cat].filter(f => f.n.toLowerCase().includes(q) || f.d.includes(q) || f.t.toLowerCase().includes(q));
                if (funcs.length === 0) return;
                
                const titles = {p0:'⭐ P0 必学函数', p1:'🚀 P1 常用函数', p2:'💎 P2 高级函数'};
                html += `<div class="section" id="${cat}-section"><h2>${titles[cat]}</h2><div class="func-grid">`;
                html += funcs.map(f => `
                    <div class="func-card" onclick="openDemo('${cat}','${f.n}')">
                        <h3>${f.n}</h3>
                        <p>${f.d}</p>
                        <span class="syntax">${f.s}</span>
                        <span class="tag">${f.t}</span>
                    </div>
                `).join('');
                html += '</div></div>';
            });
            
            document.getElementById('content').innerHTML = html || '<div class="section"><p style="text-align:center;color:#666;padding:40px;">未找到匹配的函数</p></div>';
        }
        
        function openDemo(cat, name) {
            currentFunc = allFuncs[cat].find(f => f.n === name);
            currentStep = 0;
            isPlaying = false;
            
            document.getElementById('modalTitle').textContent = currentFunc.n + ' - ' + currentFunc.d;
            renderTable();
            renderSteps();
            updateDisplay();
            document.getElementById('modal').classList.add('show');
        }
        
        function renderTable() {
            const table = document.getElementById('demoTable');
            const rows = currentFunc.tb;
            const cols = rows[0].length;
            
            let html = '<thead><tr><th class="row-header"></th>';
            for (let i = 0; i < cols; i++) {
                html += `<th class="col-header">${String.fromCharCode(65+i)}</th>`;
            }
            html += '</tr></thead><tbody>';
            
            rows.forEach((row, ri) => {
                html += `<tr><td class="row-header">${ri+1}</td>`;
                row.forEach((cell, ci) => {
                    html += `<td class="cell" data-cell="${String.fromCharCode(65+ci)}${ri+1}">${cell}</td>`;
                });
                html += '</tr>';
            });
            html += '</tbody>';
            table.innerHTML = html;
        }
        
        function renderSteps() {
            document.getElementById('stepList').innerHTML = currentFunc.st.map((s, i) => `
                <div class="step-item" id="stepItem${i}">
                    <strong>步骤${i+1}</strong>: ${s.d}
                </div>
            `).join('');
        }
        
        function updateDisplay() {
            const step = currentFunc.st[currentStep];
            document.getElementById('stepTitle').textContent = step.t;
            document.getElementById('stepDesc').textContent = step.d;
            document.getElementById('formulaInput').value = step.f || '';
            document.getElementById('progressBar').style.width = ((currentStep + 1) / currentFunc.st.length * 100) + '%';
            
            document.querySelectorAll('.cell').forEach(cell => {
                cell.classList.remove('selected', 'highlight', 'result', 'editing');
            });
            
            document.querySelectorAll('.step-item').forEach((item, i) => {
                item.classList.toggle('active', i === currentStep);
            });
            
            if (step.h) {
                step.h.forEach(id => {
                    const cell = document.querySelector(`[data-cell="${id}"]`);
                    if (cell) cell.classList.add('highlight');
                });
            }
            
            if (step.sel) {
                if (step.sel.includes(':')) {
                    step.sel.split(':').forEach(id => {
                        const cell = document.querySelector(`[data-cell="${id}"]`);
                        if (cell) {
                            cell.classList.add('selected');
                            if (step.f) cell.classList.add('editing');
                        }
                    });
                } else {
                    const cell = document.querySelector(`[data-cell="${step.sel}"]`);
                    if (cell) {
                        cell.classList.add('selected');
                        if (step.f) cell.classList.add('editing');
                    }
                }
            }
            
            if (step.r) {
                step.r.split(' ').forEach(r => {
                    const [id, val] = r.split(':');
                    const cell = document.querySelector(`[data-cell="${id}"]`);
                    if (cell) {
                        cell.textContent = val;
                        cell.classList.add('result');
                    }
                });
            }
        }
        
        function nextStep() {
            if (currentStep < currentFunc.st.length - 1) {
                currentStep++;
                updateDisplay();
            } else {
                stopPlay();
            }
        }
        
        function prevStep() {
            if (currentStep > 0) {
                currentStep--;
                updateDisplay();
                document.querySelectorAll('.cell.result').forEach(cell => {
                    const id = cell.getAttribute('data-cell');
                    const ri = parseInt(id.slice(1)) - 1;
                    const ci = id.charCodeAt(0) - 65;
                    cell.textContent = currentFunc.tb[ri][ci] || '';
                    cell.classList.remove('result');
                });
            }
        }
        
        function togglePlay() {
            if (isPlaying) stopPlay();
            else startPlay();
        }
        
        function startPlay() {
            isPlaying = true;
            document.getElementById('playBtn').textContent = '⏸';
            if (currentStep >= currentFunc.st.length - 1) {
                currentStep = 0;
                updateDisplay();
            }
            playTimer = setInterval(() => nextStep(), 2000 / playSpeed);
        }
        
        function stopPlay() {
            isPlaying = false;
            document.getElementById('playBtn').textContent = '▶';
            clearInterval(playTimer);
        }
        
        function setSpeed(s) {
            playSpeed = s;
            document.querySelectorAll('.speed-btn').forEach(b => b.classList.remove('active'));
            document.querySelector(`.speed-btn[data-speed="${s}"]`).classList.add('active');
            if (isPlaying) { stopPlay(); startPlay(); }
        }
        
        function resetDemo() {
            stopPlay();
            currentStep = 0;
            updateDisplay();
            document.querySelectorAll('.cell.result').forEach(cell => {
                const id = cell.getAttribute('data-cell');
                const ri = parseInt(id.slice(1)) - 1;
                const ci = id.charCodeAt(0) - 65;
                cell.textContent = currentFunc.tb[ri][ci] || '';
                cell.classList.remove('result');
            });
        }
        
        function closeModal() {
            document.getElementById('modal').classList.remove('show');
            stopPlay();
        }
        
        function searchFunc() {
            render();
        }
        
        function filterCategory(cat) {
            currentCategory = cat;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            render();
        }
        
        render();
    </script>
</body>
</html>
